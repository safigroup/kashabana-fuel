<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kashabana Fuel — Operations</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --surface2: #f1efe8;
    --border: rgba(0,0,0,0.10);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #9e9d98;
    --accent: #1D9E75;
    --accent-dark: #0F6E56;
    --accent-light: #E1F5EE;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #E24B4A;
    --red-light: #FCEBEB;
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --r-sm: 6px;
    --r-md: 8px;
    --r-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --surface: #252523;
      --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.18);
      --text: #f0ede8;
      --text2: #a8a7a2;
      --text3: #6a6966;
      --accent-light: #085041;
      --amber-light: #412402;
      --red-light: #501313;
      --blue-light: #042C53;
    }
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; }

  /* ── Layout ── */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 200px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; }
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }
  .topbar { position: sticky; top: 0; z-index: 20; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .content { padding: 20px; flex: 1; max-width: 1200px; }

  /* ── Sidebar ── */
  .brand { padding: 16px; border-bottom: 1px solid var(--border); }
  .brand-name { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .brand-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .nav-section { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); padding: 14px 16px 4px; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 16px; cursor: pointer; font-size: 13px; color: var(--text2); border-left: 2px solid transparent; transition: all .12s; user-select: none; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-light); color: var(--accent-dark); border-left-color: var(--accent); font-weight: 500; }
  .nav-icon { font-size: 13px; width: 16px; text-align: center; flex-shrink: 0; }
  .nav-badge { margin-left: auto; background: var(--red-light); color: var(--red); font-size: 10px; padding: 1px 6px; border-radius: 99px; font-weight: 500; }

  /* ── Buttons ── */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border: 1px solid var(--border2); border-radius: var(--r-md); background: var(--surface); color: var(--text); cursor: pointer; font-size: 12px; font-family: inherit; transition: all .12s; white-space: nowrap; }
  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(.98); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .btn-danger { border-color: var(--red); color: var(--red); }
  .btn-danger:hover { background: var(--red-light); }
  .btn-icon { padding: 6px 9px; }

  /* ── Cards / Surfaces ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 16px; margin-bottom: 14px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
  .card-title { font-size: 13px; font-weight: 500; }

  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .metric-card { background: var(--surface2); border-radius: var(--r-md); padding: 13px; }
  .metric-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
  .metric-value { font-size: 20px; font-weight: 600; }
  .metric-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ── Tables ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--text2); font-weight: 500; padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 8px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface2); }

  /* ── Badges ── */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 500; white-space: nowrap; }
  .bg-green { background: var(--accent-light); color: var(--accent-dark); }
  .bg-amber { background: var(--amber-light); color: var(--amber); }
  .bg-red { background: var(--red-light); color: var(--red); }
  .bg-blue { background: var(--blue-light); color: var(--blue); }
  .bg-gray { background: var(--surface2); color: var(--text2); }

  /* ── Forms ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 11px; color: var(--text2); font-weight: 500; }
  .form-group input, .form-group select, .form-group textarea {
    padding: 7px 10px; border: 1px solid var(--border2); border-radius: var(--r-md);
    background: var(--surface); color: var(--text); font-size: 12px; font-family: inherit;
    transition: border-color .12s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }
  .form-group textarea { resize: vertical; min-height: 60px; }

  /* ── Modal ── */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--surface); border-radius: var(--r-lg); border: 1px solid var(--border); width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 20px; }
  .modal-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }

  /* ── Fuel bars ── */
  .fuel-bar { height: 6px; border-radius: 3px; background: var(--surface2); overflow: hidden; margin-top: 3px; }
  .fuel-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width .4s; }
  .fuel-fill.low { background: var(--red); }
  .fuel-fill.mid { background: var(--amber); }

  /* ── Tabs ── */
  .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 14px; gap: 0; overflow-x: auto; }
  .tab { padding: 8px 15px; font-size: 12px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: all .12s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
  .tab:hover:not(.active) { color: var(--text); }

  /* ── Setup screen ── */
  .setup { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .setup-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 32px; width: 100%; max-width: 480px; }
  .setup-title { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
  .setup-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }
  .setup-divider { text-align: center; font-size: 11px; color: var(--text3); margin: 18px 0; }
  .code { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-md); padding: 12px 14px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; color: var(--text2); white-space: pre; overflow-x: auto; line-height: 1.7; margin-top: 14px; }

  /* ── Fleet cards ── */
  .fleet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 700px) { .fleet-grid { grid-column: 1; grid-template-columns: 1fr; } }
  .person-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .person-row:last-child { border-bottom: none; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .truck-icon { width: 34px; height: 34px; border-radius: var(--r-md); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; border: 1px solid var(--border); }

  /* ── Chart containers ── */
  .chart-box { position: relative; width: 100%; height: 220px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }
  .chart-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; font-size: 11px; color: var(--text2); }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; margin-right: 4px; vertical-align: middle; }

  /* ── Misc ── */
  .station-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .station-card { flex: 1; min-width: 200px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 13px; }
  .station-name { font-size: 12px; font-weight: 500; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .empty { text-align: center; padding: 36px; color: var(--text3); font-size: 12px; }
  .error-bar { background: var(--red-light); color: var(--red); border-radius: var(--r-md); padding: 8px 12px; font-size: 12px; margin-bottom: 12px; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--text); color: var(--bg); padding: 10px 16px; border-radius: var(--r-md); font-size: 12px; z-index: 200; opacity: 0; transition: opacity .2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .summary-two { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 650px) { .summary-two { grid-template-columns: 1fr; } .app { flex-direction: column; } .sidebar { width: 100%; height: auto; flex-direction: row; flex-wrap: wrap; overflow-x: auto; } }
  .page-title { font-size: 14px; font-weight: 600; }
  .topbar-right { display: flex; gap: 8px; flex-wrap: wrap; }
  .sync-indicator { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 5px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .sync-dot.offline { background: var(--red); }
</style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  CONFIG & STATE
// ─────────────────────────────────────────────
const CFG_KEY = 'kashabana_cfg';
const STATIONS = ['Goma', 'Bukavu'];
const FUEL_TYPES = ['Gasoline', 'Diesel'];
const SUPPLIERS = ['Vivo Energy (Shell)', 'TotalEnergies', 'COBIL', 'Other'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DRIVER_STATUSES = ['Active', 'On Leave', 'Inactive'];
const TRUCK_STATUSES  = ['Active', 'In Maintenance', 'Retired'];

let SB = null; // supabase client

let S = {
  page: 'setup', tab: 'all', modal: null, form: {}, error: null,
  loading: false, online: false,
  deliveries: [], sales: [], inventory: [], drivers: [], trucks: [],
};

let charts = {};

// ─────────────────────────────────────────────
//  SUPABASE
// ─────────────────────────────────────────────
function initSB(url, key) {
  SB = supabase.createClient(url, key);
}

async function dbLoad() {
  if (!SB) return;
  S.loading = true; render();
  try {
    const [del, sal, inv, drv, trk] = await Promise.all([
      SB.from('fuel_deliveries').select('*').order('date', { ascending: false }).limit(500),
      SB.from('fuel_sales').select('*').order('date', { ascending: false }).limit(500),
      SB.from('fuel_inventory').select('*'),
      SB.from('drivers').select('*').order('created_at'),
      SB.from('trucks').select('*').order('created_at'),
    ]);
    if (del.error || sal.error) throw del.error || sal.error;
    S.deliveries = del.data || [];
    S.sales      = sal.data  || [];
    S.inventory  = inv.data  || [];
    S.drivers    = drv.data  || [];
    S.trucks     = trk.data  || [];
    S.online = true;
    toast('Data loaded');
  } catch(e) {
    S.online = false;
    toast('DB error: ' + (e.message || e), true);
  }
  S.loading = false; render();
}

async function dbInsert(table, row) {
  if (!SB) { toast('Not connected', true); return false; }
  const { error } = await SB.from(table).insert(row);
  if (error) { toast(error.message, true); return false; }
  return true;
}

async function dbUpdate(table, id, updates) {
  if (!SB) return false;
  const { error } = await SB.from(table).update(updates).eq('id', id);
  if (error) { toast(error.message, true); return false; }
  return true;
}

async function dbDelete(table, id) {
  if (!SB) return false;
  const { error } = await SB.from(table).delete().eq('id', id);
  if (error) { toast(error.message, true); return false; }
  return true;
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function fmtUSD(n)  { return '$' + Number(n||0).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}); }
function fmtL(n)    { return Number(n||0).toLocaleString('en-US', {maximumFractionDigits:0}) + ' L'; }
function fmtNum(n)  { return Number(n||0).toLocaleString('en-US', {maximumFractionDigits:1}); }
function fmtDate(s) { if (!s) return '—'; const d = new Date(s+'T00:00:00'); return d.toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'}); }
function today()    { return new Date().toISOString().slice(0,10); }
function initials(n){ return (n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function avatarStyle(n) {
  const palettes = [['#E1F5EE','#0F6E56'],['#E6F1FB','#185FA5'],['#FAEEDA','#854F0B'],['#EEEDFE','#3C3489'],['#FAECE7','#993C1D']];
  const [bg,c] = palettes[(n||'').charCodeAt(0)%palettes.length];
  return `background:${bg};color:${c}`;
}
function genId() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2); }

function toast(msg, isErr=false) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.style.background = isErr ? 'var(--red)' : 'var(--text)';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function destroyCharts(...ids) {
  ids.forEach(id => { if (charts[id]) { charts[id].destroy(); delete charts[id]; } });
}

// ─────────────────────────────────────────────
//  VIRTUAL DOM (lightweight h() builder)
// ─────────────────────────────────────────────
function h(tag, attrs={}, ...kids) {
  const el = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (v == null || v === false) continue;
    if (k === 'cls')   el.className = v;
    else if (k === 'html') el.innerHTML = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for (const c of kids.flat(Infinity)) {
    if (c == null || c === false) continue;
    if (c instanceof Node) el.appendChild(c);
    else el.appendChild(document.createTextNode(String(c)));
  }
  return el;
}

function badge(text, cls='bg-gray') { return h('span', {cls:'badge '+cls}, text); }
function stationBadge(s) { return badge(s, s==='Goma'?'bg-blue':'bg-green'); }
function fuelBadge(f) { return badge(f, f==='Diesel'?'bg-amber':'bg-gray'); }
function statusBadge(s) {
  const map = { Active:'bg-green', 'On Leave':'bg-amber', Inactive:'bg-gray', 'In Maintenance':'bg-amber', Retired:'bg-gray', Critical:'bg-red', Low:'bg-amber', OK:'bg-green' };
  return badge(s, map[s]||'bg-gray');
}

// ─────────────────────────────────────────────
//  FORM HELPERS
// ─────────────────────────────────────────────
function inp(label, key, type='text', placeholder='', required=false) {
  if (!S.form[key] && key === 'date') S.form[key] = today();
  return h('div', {cls:'form-group'},
    h('label', {}, label + (required?' *':'')),
    h('input', {type, placeholder, value: S.form[key]||'', onInput: e=>{ S.form[key]=e.target.value; }})
  );
}
function sel(label, key, options, placeholder='— select —', required=false) {
  const s = h('select', {onChange: e=>{ S.form[key]=e.target.value; }},
    h('option', {value:''}, placeholder),
    ...options.map(o => { const opt = h('option', {value:o}, o); if (S.form[key]===o) opt.selected=true; return opt; })
  );
  return h('div', {cls:'form-group'}, h('label', {}, label+(required?' *':'')), s);
}

// ─────────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────────
function calcStats() {
  const rev   = S.sales.reduce((a,r)=>a+(r.total_revenue||r.liters*r.price_per_liter), 0);
  const cost  = S.deliveries.reduce((a,r)=>a+(r.total_cost||r.liters*r.cost_per_liter), 0);
  const todayStr = today();
  const todayRev = S.sales.filter(s=>s.date===todayStr).reduce((a,r)=>a+(r.total_revenue||r.liters*r.price_per_liter), 0);
  const lSold = S.sales.reduce((a,r)=>a+r.liters, 0);
  return {
    rev, cost, margin: rev-cost,
    marginPct: rev>0 ? (rev-cost)/rev*100 : 0,
    todayRev, lSold,
    activeDrivers: S.drivers.filter(d=>d.status==='Active').length,
    activeFleet:   S.trucks.filter(t=>t.status==='Active').length,
  };
}

function getMonthly() {
  const now = new Date();
  return Array.from({length:6}, (_,i)=>{
    const dt = new Date(now.getFullYear(), now.getMonth()-5+i, 1);
    const yr = dt.getFullYear(), mo = dt.getMonth();
    const label = MONTHS_SHORT[mo]+' '+String(yr).slice(2);
    const inRange = arr => arr.filter(r=>{ const d=new Date(r.date+'T00:00:00'); return d.getFullYear()===yr&&d.getMonth()===mo; });
    const mS = inRange(S.sales), mD = inRange(S.deliveries);
    const revenue = mS.reduce((a,r)=>a+(r.total_revenue||r.liters*r.price_per_liter),0);
    const cost    = mD.reduce((a,r)=>a+(r.total_cost||r.liters*r.cost_per_liter),0);
    return {
      label, revenue, cost, margin: revenue-cost,
      gomaRev:     mS.filter(s=>s.station==='Goma').reduce((a,r)=>a+(r.total_revenue||r.liters*r.price_per_liter),0),
      bukavuRev:   mS.filter(s=>s.station==='Bukavu').reduce((a,r)=>a+(r.total_revenue||r.liters*r.price_per_liter),0),
      gasolineL:   mS.filter(s=>s.fuel_type==='Gasoline').reduce((a,r)=>a+r.liters,0),
      dieselL:     mS.filter(s=>s.fuel_type==='Diesel').reduce((a,r)=>a+r.liters,0),
    };
  });
}

function avgCostMap() {
  const map = {};
  S.deliveries.forEach(d=>{ const k=d.station+d.fuel_type; (map[k]=map[k]||[]).push(d.cost_per_liter); });
  return map;
}

// ─────────────────────────────────────────────
//  ACTIONS
// ─────────────────────────────────────────────
function updateLocalInventory(station, fuelType, liters, op) {
  let inv = S.inventory.find(i=>i.station===station);
  if (!inv) { inv={id:genId(),station,gasoline_liters:0,diesel_liters:0,gasoline_capacity:50000,diesel_capacity:50000}; S.inventory.push(inv); }
  const field = fuelType==='Gasoline'?'gasoline_liters':'diesel_liters';
  inv[field] = Math.max(0, (inv[field]||0) + (op==='add'?liters:-liters));
}

async function saveDelivery() {
  const f = S.form;
  if (!f.date||!f.supplier||!f.station||!f.fuel_type||!f.liters||!f.cost_per_liter) { S.error='Please fill all required fields'; render(); return; }
  const row = {
    id: genId(), date:f.date, supplier:f.supplier, station:f.station,
    fuel_type:f.fuel_type, liters:parseFloat(f.liters), cost_per_liter:parseFloat(f.cost_per_liter),
    total_cost: parseFloat(f.liters)*parseFloat(f.cost_per_liter),
    truck_plate:f.truck_plate||'', driver:f.driver||'', notes:f.notes||''
  };
  const ok = await dbInsert('fuel_deliveries', row);
  if (!ok) return;
  S.deliveries.unshift(row);
  updateLocalInventory(row.station, row.fuel_type, row.liters, 'add');
  // bump driver trip count
  const drv = S.drivers.find(d=>d.name===row.driver);
  if (drv) { drv.trips=(drv.trips||0)+1; await dbUpdate('drivers', drv.id, {trips:drv.trips}); }
  closeModal(); toast('Delivery recorded');
}

async function saveSale() {
  const f = S.form;
  if (!f.date||!f.station||!f.fuel_type||!f.liters||!f.price_per_liter) { S.error='Please fill all required fields'; render(); return; }
  const row = {
    id:genId(), date:f.date, station:f.station, fuel_type:f.fuel_type,
    liters:parseFloat(f.liters), price_per_liter:parseFloat(f.price_per_liter),
    total_revenue:parseFloat(f.liters)*parseFloat(f.price_per_liter), notes:f.notes||''
  };
  const ok = await dbInsert('fuel_sales', row);
  if (!ok) return;
  S.sales.unshift(row);
  updateLocalInventory(row.station, row.fuel_type, row.liters, 'sub');
  closeModal(); toast('Sale recorded');
}

async function saveDriver() {
  const f = S.form;
  if (!f.name) { S.error='Driver name required'; render(); return; }
  const row = { id:genId(), name:f.name, phone:f.phone||'', license:f.license||'', status:f.status||'Active', station:f.station||'Goma', trips:0, notes:f.notes||'' };
  const ok = await dbInsert('drivers', row);
  if (!ok) return;
  S.drivers.push(row);
  closeModal(); toast('Driver added');
}

async function saveTruck() {
  const f = S.form;
  if (!f.plate) { S.error='Plate number required'; render(); return; }
  const row = { id:genId(), plate:f.plate, type:f.type||'Fuel Tanker', make:f.make||'', capacity_l:parseFloat(f.capacity_l)||15000, status:f.status||'Active', station:f.station||'Goma', mileage:parseInt(f.mileage)||0, last_service:f.last_service||null, notes:f.notes||'' };
  const ok = await dbInsert('trucks', row);
  if (!ok) return;
  S.trucks.push(row);
  closeModal(); toast('Truck added');
}

async function deleteRecord(table, id, arr) {
  if (!confirm('Delete this record?')) return;
  const ok = await dbDelete(table, id);
  if (!ok) return;
  const idx = arr.findIndex(r=>r.id===id);
  if (idx > -1) arr.splice(idx, 1);
  render(); toast('Deleted');
}

function closeModal() { S.modal=null; S.form={}; S.error=null; render(); }

}

function renderReports() {
  const byStation = {}; STATIONS.forEach(s=>{ byStation[s]={rev:0,cost:0,lSold:0,lRecv:0}; });
  S.sales.forEach(s=>{ if(byStation[s.station]){ byStation[s.station].rev+=s.total_revenue||s.liters*s.price_per_liter; byStation[s.station].lSold+=s.liters; }});
  S.deliveries.forEach(d=>{ if(byStation[d.station]){ byStation[d.station].cost+=d.total_cost||d.liters*d.cost_per_liter; byStation[d.station].lRecv+=d.liters; }});
  const byFuel = {}; FUEL_TYPES.forEach(f=>{ byFuel[f]={rev:0,cost:0,liters:0}; });
  S.sales.forEach(s=>{ if(byFuel[s.fuel_type]){ byFuel[s.fuel_type].rev+=s.total_revenue||s.liters*s.price_per_liter; byFuel[s.fuel_type].liters+=s.liters; }});
  S.deliveries.forEach(d=>{ if(byFuel[d.fuel_type]) byFuel[d.fuel_type].cost+=d.total_cost||d.liters*d.cost_per_liter; });

  return h('div',{},
    h('div',{cls:'card'},
      h('div',{cls:'card-header'},h('div',{cls:'card-title'},'Performance by station')),
      h('div',{cls:'table-wrap'},h('table',{},
        h('thead',{},h('tr',{},h('th',{},'Station'),h('th',{},'Revenue'),h('th',{},'Cost'),h('th',{},'Margin'),h('th',{},'Margin %'),h('th',{},'L sold'),h('th',{},'L received'))),
        h('tbody',{},...STATIONS.map(s=>{ const d=byStation[s]; const mg=d.rev-d.cost; const pct=d.rev>0?Math.round(mg/d.rev*100):0;
          return h('tr',{},h('td',{},stationBadge(s)),h('td',{},fmtUSD(d.rev)),h('td',{},fmtUSD(d.cost)),
            h('td',{style:'font-weight:500;color:'+(mg>=0?'var(--accent)':'var(--red)')},fmtUSD(mg)),
            h('td',{},pct+'%'),h('td',{},fmtL(d.lSold)),h('td',{},fmtL(d.lRecv)));
        }))
      ))
    ),
    h('div',{cls:'card'},
      h('div',{cls:'card-header'},h('div',{cls:'card-title'},'Performance by fuel type')),
      h('div',{cls:'table-wrap'},h('table',{},
        h('thead',{},h('tr',{},h('th',{},'Fuel'),h('th',{},'Revenue'),h('th',{},'Cost'),h('th',{},'Margin'),h('th',{},'L sold'))),
        h('tbody',{},...FUEL_TYPES.map(f=>{ const d=byFuel[f]; const mg=d.rev-d.cost;
          return h('tr',{},h('td',{},fuelBadge(f)),h('td',{},fmtUSD(d.rev)),h('td',{},fmtUSD(d.cost)),
            h('td',{style:'font-weight:500;color:'+(mg>=0?'var(--accent)':'var(--red)')},fmtUSD(mg)),h('td',{},fmtL(d.liters)));
        }))
      ))
    ),
    h('div',{cls:'card'},
      h('div',{cls:'card-header'},h('div',{cls:'card-title'},'Fleet overview')),
      h('div',{cls:'table-wrap'},h('table',{},
        h('thead',{},h('tr',{},h('th',{},'Plate'),h('th',{},'Station'),h('th',{},'Make'),h('th',{},'Capacity'),h('th',{},'Mileage'),h('th',{},'Last service'),h('th',{},'Status'))),
        h('tbody',{},...S.trucks.map(t=>h('tr',{},
          h('td',{style:'font-weight:500'},t.plate),h('td',{},t.station),h('td',{},t.make||'—'),
          h('td',{},fmtL(t.capacity_l)),h('td',{},fmtNum(t.mileage)+' km'),
          h('td',{},fmtDate(t.last_service)),h('td',{},statusBadge(t.status))
        )))
      ))
    )
  );
}

function renderModal() {
  if (!S.modal) return null;
  const M = S.modal;
  if (!S.form.date) S.form.date = today();
  const tPlates  = S.trucks.filter(t=>t.status==='Active').map(t=>t.plate);
  const dNames   = S.drivers.filter(d=>d.status==='Active').map(d=>d.name);

  const titles = { delivery:'Record delivery', sale:'Record sale', driver:'Add driver', truck:'Add truck' };
  let fields, onSave;

  if (M==='delivery') {
    fields = h('div',{cls:'form-grid'},
      inp('Date','date','date','',true), sel('Station','station',STATIONS,'— select —',true),
      sel('Fuel type','fuel_type',FUEL_TYPES,'— select —',true), inp('Liters','liters','number','10000',true),
      sel('Supplier','supplier',SUPPLIERS,'— select —',true), inp('Cost per liter ($)','cost_per_liter','number','1.10',true),
      sel('Truck plate','truck_plate',tPlates,'— optional —'), sel('Driver','driver',dNames,'— optional —'),
      h('div',{cls:'form-group full'},h('label',{},'Notes'),h('input',{type:'text',placeholder:'Optional',value:S.form.notes||'',onInput:e=>S.form.notes=e.target.value}))
    ); onSave = saveDelivery;
  } else if (M==='sale') {
    fields = h('div',{cls:'form-grid'},
      inp('Date','date','date','',true), sel('Station','station',STATIONS,'— select —',true),
      sel('Fuel type','fuel_type',FUEL_TYPES,'— select —',true), inp('Liters','liters','number','2000',true),
      inp('Price per liter ($)','price_per_liter','number','1.55',true),
      h('div',{cls:'form-group full'},h('label',{},'Notes'),h('input',{type:'text',placeholder:'Optional',value:S.form.notes||'',onInput:e=>S.form.notes=e.target.value}))
    ); onSave = saveSale;
  } else if (M==='driver') {
    fields = h('div',{cls:'form-grid'},
      inp('Full name','name','text','',true), inp('Phone','phone','text','+243 8xx xxx xxx'),
      inp('License number','license','text','GOM-DL-0001'), sel('Station','station',STATIONS),
      sel('Status','status',DRIVER_STATUSES,'Active'),
      h('div',{cls:'form-group full'},h('label',{},'Notes'),h('input',{type:'text',placeholder:'Optional',value:S.form.notes||'',onInput:e=>S.form.notes=e.target.value}))
    ); onSave = saveDriver;
  } else if (M==='truck') {
    fields = h('div',{cls:'form-grid'},
      inp('Plate / ID','plate','text','GOM-441A',true), sel('Station','station',STATIONS),
      inp('Make / model','make','text','Mercedes-Benz Actros'), inp('Capacity (L)','capacity_l','number','15000'),
      sel('Status','status',TRUCK_STATUSES,'Active'), inp('Current mileage (km)','mileage','number','0'),
      inp('Last service date','last_service','date'),
      h('div',{cls:'form-group full'},h('label',{},'Notes'),h('input',{type:'text',placeholder:'Optional',value:S.form.notes||'',onInput:e=>S.form.notes=e.target.value}))
    ); onSave = saveTruck;
  }

  return h('div',{cls:'overlay',onClick:e=>{ if(e.target===e.currentTarget) closeModal(); }},
    h('div',{cls:'modal'},
      h('div',{cls:'modal-title'},titles[M]),
      S.error ? h('div',{cls:'error-bar'},S.error) : null,
      fields,
      h('div',{cls:'modal-footer'},
        h('button',{cls:'btn',onClick:closeModal},'Cancel'),
        h('button',{cls:'btn btn-primary',onClick:onSave},'Save record')
      )
    )
  );
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
const PAGE_META = [
  { id:'dashboard',  icon:'◉', label:'Dashboard',     section:'Operations' },
  { id:'deliveries', icon:'↓', label:'Deliveries',    section:'Operations' },
  { id:'sales',      icon:'↑', label:'Sales',         section:'Operations' },
  { id:'inventory',  icon:'▦', label:'Inventory',     section:'Operations' },
  { id:'fleet',      icon:'◈', label:'Fleet & drivers',section:'Management' },
  { id:'trends',     icon:'∿', label:'Trends',        section:'Analytics'  },
  { id:'reports',    icon:'≡', label:'Reports',       section:'Analytics'  },
];
const PAGE_RENDERERS = { dashboard:renderDashboard, deliveries:renderDeliveries, sales:renderSales, inventory:renderInventory, fleet:renderFleet, trends:renderTrends, reports:renderReports };

function render() {
  const app = document.getElementById('app');
  // cleanup stale charts
  Object.keys(charts).forEach(id=>{ if (!document.getElementById(id)) destroyCharts(id); });

  if (S.page === 'setup') { app.innerHTML=''; app.appendChild(renderSetup()); return; }
  if (S.loading) { app.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:13px;color:var(--text2)">Loading data…</div>'; return; }

  const pg = S.page;
  const meta = PAGE_META.find(p=>p.id===pg);
  const sections = [...new Set(PAGE_META.map(p=>p.section))];

  // topbar buttons
  const topBtns = [];
  if (pg==='fleet') {
    topBtns.push(h('button',{cls:'btn btn-sm',onClick:()=>{S.modal='truck';S.form={};S.error=null;render();}},'+ Truck'));
    topBtns.push(h('button',{cls:'btn btn-sm btn-primary',onClick:()=>{S.modal='driver';S.form={};S.error=null;render();}},'+ Driver'));
  }
  if (['dashboard','deliveries'].includes(pg))
    topBtns.push(h('button',{cls:'btn btn-sm',onClick:()=>{S.modal='delivery';S.form={};S.error=null;render();}},'+ Delivery'));
  if (['dashboard','sales'].includes(pg))
    topBtns.push(h('button',{cls:'btn btn-sm btn-primary',onClick:()=>{S.modal='sale';S.form={};S.error=null;render();}},'+ Sale'));
  if (SB)
    topBtns.push(h('button',{cls:'btn btn-sm',onClick:dbLoad},'↻ Refresh'));

  const sidebar = h('div',{cls:'sidebar'},
    h('div',{cls:'brand'},
      h('div',{cls:'brand-name'},'⛽ Kashabana Fuel'),
      h('div',{cls:'brand-sub'},S.online?'● Live database':'○ Demo mode')
    ),
    ...sections.flatMap(sec=>[
      h('div',{cls:'nav-section'},sec),
      ...PAGE_META.filter(p=>p.section===sec).map(p=>{
        const maint = p.id==='fleet' && S.trucks.filter(t=>t.status==='In Maintenance').length;
        return h('div',{cls:'nav-item'+(pg===p.id?' active':''),onClick:()=>{S.page=p.id;S.tab='all';render();}},
          h('span',{cls:'nav-icon'},p.icon), p.label,
          maint ? h('span',{cls:'nav-badge'},maint) : null
        );
      })
    ]),
    h('div',{style:'margin-top:auto;padding:16px;border-top:1px solid var(--border)'},
      h('button',{cls:'btn btn-sm',style:'width:100%;font-size:11px',onClick:()=>{
        if(confirm('Disconnect and return to setup?')){localStorage.removeItem(CFG_KEY);SB=null;S={...S,page:'setup',form:{},deliveries:[],sales:[],inventory:[],drivers:[],trucks:[],online:false};render();}
      }},'⚙ Settings / reconnect')
    )
  );

  const mainEl = h('div',{cls:'main'},
    h('div',{cls:'topbar'},
      h('div',{cls:'page-title'},meta?.label||''),
      h('div',{cls:'topbar-right'},...topBtns)
    ),
    h('div',{cls:'content'},
      (PAGE_RENDERERS[pg]||renderDashboard)(),
      renderModal()
    )
  );

  const layout = h('div',{cls:'app'}, sidebar, mainEl);
  app.innerHTML='';
  app.appendChild(layout);
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
(function boot() {
  try {
    const cfg = JSON.parse(localStorage.getItem(CFG_KEY)||'{}');
    if (cfg.url && cfg.key) {
      initSB(cfg.url, cfg.key);
      S.form = { url:cfg.url, key:cfg.key };
      S.page = 'dashboard';
      render();
      dbLoad();
      return;
    }
  } catch(e) {}
  S.page = 'setup';
  render();
})();
</script>
