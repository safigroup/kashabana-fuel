<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kashabana Fuel — Operations</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#f8f7f4; --surface:#fff; --surface2:#f1efe8;
    --border:rgba(0,0,0,.10); --border2:rgba(0,0,0,.18);
    --text:#1a1a18; --text2:#5f5e5a; --text3:#9e9d98;
    --accent:#1D9E75; --accent-dark:#0F6E56; --accent-light:#E1F5EE;
    --amber:#BA7517; --amber-light:#FAEEDA;
    --red:#E24B4A; --red-light:#FCEBEB;
    --blue:#185FA5; --blue-light:#E6F1FB;
    --purple:#3C3489; --purple-light:#EEEDFE;
    --r-sm:6px; --r-md:8px; --r-lg:12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:#1c1c1a; --surface:#252523; --surface2:#2e2e2b;
      --border:rgba(255,255,255,.10); --border2:rgba(255,255,255,.18);
      --text:#f0ede8; --text2:#a8a7a2; --text3:#6a6966;
      --accent-light:#085041; --amber-light:#412402;
      --red-light:#501313; --blue-light:#042C53; --purple-light:#26215C;
    }
  }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; min-height:100vh; }
  .app { display:flex; height:100vh; overflow:hidden; }
  .sidebar { width:204px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow-y:auto; }
  .main { flex:1; overflow-y:auto; display:flex; flex-direction:column; min-width:0; }
  .topbar { position:sticky; top:0; z-index:20; background:var(--surface); border-bottom:1px solid var(--border); padding:10px 18px; display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .content { padding:18px; flex:1; }
  .brand { padding:14px 16px; border-bottom:1px solid var(--border); }
  .brand-name { font-size:14px; font-weight:600; display:flex; align-items:center; gap:7px; }
  .brand-sub { font-size:11px; color:var(--text3); margin-top:2px; }
  .nav-section { font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--text3); padding:13px 16px 4px; }
  .nav-item { display:flex; align-items:center; gap:8px; padding:7px 16px; cursor:pointer; font-size:13px; color:var(--text2); border-left:2px solid transparent; transition:all .12s; user-select:none; }
  .nav-item:hover { background:var(--surface2); color:var(--text); }
  .nav-item.active { background:var(--accent-light); color:var(--accent-dark); border-left-color:var(--accent); font-weight:500; }
  .nav-icon { font-size:12px; width:15px; text-align:center; flex-shrink:0; }
  .nav-badge { margin-left:auto; background:var(--red-light); color:var(--red); font-size:10px; padding:1px 6px; border-radius:99px; font-weight:500; }
  .btn { display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border:1px solid var(--border2); border-radius:var(--r-md); background:var(--surface); color:var(--text); cursor:pointer; font-size:12px; font-family:inherit; transition:all .12s; white-space:nowrap; }
  .btn:hover { background:var(--surface2); }
  .btn:active { transform:scale(.98); }
  .btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent-dark); border-color:var(--accent-dark); }
  .btn-sm { padding:4px 9px; font-size:11px; }
  .btn-danger { border-color:var(--red); color:var(--red); }
  .btn-danger:hover { background:var(--red-light); }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:16px; margin-bottom:14px; }
  .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:10px; flex-wrap:wrap; }
  .card-title { font-size:13px; font-weight:500; }
  .metric-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:16px; }
  .metric-card { background:var(--surface2); border-radius:var(--r-md); padding:12px; }
  .metric-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin-bottom:3px; }
  .metric-value { font-size:20px; font-weight:600; }
  .metric-sub { font-size:11px; color:var(--text2); margin-top:2px; }
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--text2); font-weight:500; padding:6px 8px; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }
  td { padding:7px 8px; border-bottom:1px solid var(--border); vertical-align:middle; white-space:nowrap; }
  tr:last-child td { border-bottom:none; }
  tbody tr:hover td { background:var(--surface2); }
  .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:99px; font-size:10px; font-weight:500; white-space:nowrap; }
  .bg-green  { background:var(--accent-light);  color:var(--accent-dark); }
  .bg-amber  { background:var(--amber-light);   color:var(--amber); }
  .bg-red    { background:var(--red-light);     color:var(--red); }
  .bg-blue   { background:var(--blue-light);    color:var(--blue); }
  .bg-gray   { background:var(--surface2);      color:var(--text2); }
  .bg-purple { background:var(--purple-light);  color:var(--purple); }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; }
  .form-group { display:flex; flex-direction:column; gap:4px; }
  .form-group.full { grid-column:1/-1; }
  .form-group label { font-size:11px; color:var(--text2); font-weight:500; }
  .form-group input, .form-group select, .form-group textarea { padding:7px 10px; border:1px solid var(--border2); border-radius:var(--r-md); background:var(--surface); color:var(--text); font-size:12px; font-family:inherit; transition:border-color .12s; }
  .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--accent); }
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; }
  .modal { background:var(--surface); border-radius:var(--r-lg); border:1px solid var(--border); width:100%; max-width:520px; max-height:90vh; overflow-y:auto; padding:20px; }
  .modal-title { font-size:14px; font-weight:600; margin-bottom:16px; }
  .modal-footer { display:flex; gap:8px; justify-content:flex-end; margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
  .fuel-bar { height:6px; border-radius:3px; background:var(--surface2); overflow:hidden; margin-top:3px; }
  .fuel-fill { height:100%; border-radius:3px; background:var(--accent); transition:width .4s; }
  .fuel-fill.low { background:var(--red); }
  .fuel-fill.mid { background:var(--amber); }
  .tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:14px; overflow-x:auto; }
  .tab { padding:7px 14px; font-size:12px; color:var(--text2); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; white-space:nowrap; transition:all .12s; }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }
  .tab:hover:not(.active) { color:var(--text); }
  .setup { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .setup-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:32px; width:100%; max-width:500px; }
  .setup-title { font-size:20px; font-weight:600; margin-bottom:6px; }
  .setup-sub { font-size:13px; color:var(--text2); margin-bottom:24px; line-height:1.6; }
  .setup-divider { text-align:center; font-size:11px; color:var(--text3); margin:16px 0; }
  .code { background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-md); padding:12px 14px; font-family:'SF Mono','Fira Code',monospace; font-size:11px; color:var(--text2); white-space:pre; overflow-x:auto; line-height:1.7; margin-top:10px; }
  .fleet-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .person-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
  .person-row:last-child { border-bottom:none; }
  .avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; flex-shrink:0; }
  .truck-icon { width:34px; height:34px; border-radius:var(--r-md); background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; border:1px solid var(--border); }
  .chart-box { position:relative; width:100%; height:210px; }
  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .chart-legend { display:flex; flex-wrap:wrap; gap:12px; margin-bottom:8px; font-size:11px; color:var(--text2); }
  .legend-swatch { width:10px; height:10px; border-radius:2px; display:inline-block; margin-right:4px; vertical-align:middle; }
  .station-row { display:flex; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .station-card { flex:1; min-width:180px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-lg); padding:13px; }
  .station-name { font-size:12px; font-weight:500; margin-bottom:10px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--accent); flex-shrink:0; }
  .dot-depot { background:var(--amber); }
  .summary-two { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .empty { text-align:center; padding:36px; color:var(--text3); font-size:12px; }
  .error-bar { background:var(--red-light); color:var(--red); border-radius:var(--r-md); padding:8px 12px; font-size:12px; margin-bottom:12px; }
  .toast { position:fixed; bottom:20px; right:20px; background:var(--text); color:var(--bg); padding:10px 16px; border-radius:var(--r-md); font-size:12px; z-index:200; opacity:0; transition:opacity .2s; pointer-events:none; }
  .toast.show { opacity:1; }
  .page-title { font-size:14px; font-weight:600; }
  .topbar-right { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .currency-pill { display:flex; background:var(--surface2); border:1px solid var(--border); border-radius:99px; overflow:hidden; }
  .currency-opt { padding:4px 9px; font-size:11px; cursor:pointer; color:var(--text2); transition:all .12s; }
  .currency-opt.active { background:var(--accent); color:#fff; }
  .type-tag { font-size:10px; color:var(--text3); }
  .station-list-item { display:flex; align-items:center; justify-content:space-between; padding:9px 12px; background:var(--surface2); border-radius:var(--r-md); margin-bottom:6px; }
  .station-list-left { display:flex; align-items:center; gap:10px; font-size:13px; }
  @media (max-width:700px) {
    .fleet-grid,.two-col,.summary-two { grid-template-columns:1fr; }
    .app { flex-direction:column; }
    .sidebar { width:100%; height:auto; }
  }
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
// ═══════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════
const CFG_KEY      = 'kashabana_cfg';
const SETTINGS_KEY = 'kashabana_settings';
const FUEL_TYPES      = ['Gasoline','Diesel'];
const DEFAULT_SUPPLIERS = ['Vivo Energy (Shell)','TotalEnergies','COBIL','Other'];
const DRIVER_STATUSES = ['Active','On Leave','Inactive'];
const TRUCK_STATUSES  = ['Active','In Maintenance','Retired'];
const STATION_TYPES   = ['Gas Station','Storage Depot','Blending Facility','Other'];
const MONTHS_SHORT    = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const ST_COLORS       = ['#1D9E75','#378ADD','#BA7517','#7F77DD','#D85A30','#639922','#D4537E'];

const DEFAULT_CURRENCIES = [
  {code:'USD',symbol:'$',  name:'US Dollar',         rate:1},
  {code:'CDF',symbol:'FC', name:'Congolese Franc',   rate:2800},
  {code:'RWF',symbol:'RWF',name:'Rwandan Franc',     rate:1340},
  {code:'TZS',symbol:'TSh',name:'Tanzanian Shilling',rate:2600},
  {code:'KES',symbol:'KSh',name:'Kenyan Shilling',   rate:130},
];

function loadSettings(){ try{return JSON.parse(localStorage.getItem(SETTINGS_KEY)||'{}');}catch{return{};} }
function saveSettings(s){ localStorage.setItem(SETTINGS_KEY,JSON.stringify(s)); }

const _sv = loadSettings();
let S = {
  page:'setup', tab:'all', modal:null, form:{}, error:null,
  loading:false, online:false,
  deliveries:[], sales:[], inventory:[], drivers:[], trucks:[],
  stations: _sv.stations || [
    {id:'s1',name:'Goma',  type:'Gas Station',city:'Goma',  country:'DRC'},
    {id:'s2',name:'Bukavu',type:'Gas Station',city:'Bukavu',country:'DRC'},
  ],
  currencies:     _sv.currencies     || DEFAULT_CURRENCIES,
  activeCurrency: _sv.activeCurrency || 'USD',
  suppliers:      _sv.suppliers      || [...DEFAULT_SUPPLIERS],
};
let SB = null;
let charts = {};

// ═══════════════════════════════════════
//  CURRENCY
// ═══════════════════════════════════════
function getCurrency(code){
  return S.currencies.find(c=>c.code===(code||S.activeCurrency)) || S.currencies[0];
}
function fmtMoney(usdAmt){
  const c=getCurrency(); const v=(usdAmt||0)*c.rate;
  if(Math.abs(v)>=1e6) return c.symbol+(v/1e6).toFixed(1)+'M';
  if(Math.abs(v)>=1e3) return c.symbol+(v/1e3).toFixed(1)+'k';
  return c.symbol+Math.round(v).toLocaleString('en-US');
}
function fmtMoneyFull(usdAmt){
  const c=getCurrency(); return c.symbol+Math.round((usdAmt||0)*c.rate).toLocaleString('en-US');
}
function fmtPricePerL(usdPerL){
  const c=getCurrency(); const v=(usdPerL||0)*c.rate;
  return c.symbol+(c.code==='USD'?v.toFixed(3):Math.round(v).toLocaleString('en-US'))+'/L';
}

// ═══════════════════════════════════════
//  SUPABASE
// ═══════════════════════════════════════
function initSB(url,key){ SB=supabase.createClient(url,key); }
async function dbLoad(){
  if(!SB)return; S.loading=true; render();
  try{
    const[del,sal,inv,drv,trk]=await Promise.all([
      SB.from('fuel_deliveries').select('*').order('date',{ascending:false}).limit(500),
      SB.from('fuel_sales').select('*').order('date',{ascending:false}).limit(500),
      SB.from('fuel_inventory').select('*'),
      SB.from('drivers').select('*').order('created_at'),
      SB.from('trucks').select('*').order('created_at'),
    ]);
    if(del.error)throw del.error;
    S.deliveries=del.data||[]; S.sales=sal.data||[];
    S.inventory=inv.data||[]; S.drivers=drv.data||[]; S.trucks=trk.data||[];
    S.online=true; toast('Data loaded');
  }catch(e){ S.online=false; toast('DB error: '+(e.message||e),true); }
  S.loading=false; render();
}
async function dbInsert(t,r){ if(!SB){toast('Not connected',true);return false;} const{error}=await SB.from(t).insert(r); if(error){toast(error.message,true);return false;} return true; }
async function dbUpdate(t,id,u){ if(!SB)return false; const{error}=await SB.from(t).update(u).eq('id',id); if(error){toast(error.message,true);return false;} return true; }
async function dbDelete(t,id){ if(!SB)return false; const{error}=await SB.from(t).delete().eq('id',id); if(error){toast(error.message,true);return false;} return true; }

// ═══════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════
function fmtL(n){ return Number(n||0).toLocaleString('en-US',{maximumFractionDigits:0})+' L'; }
function fmtNum(n){ return Number(n||0).toLocaleString('en-US',{maximumFractionDigits:1}); }
function fmtDate(s){ if(!s)return'—'; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function today(){ return new Date().toISOString().slice(0,10); }
function initials(n){ return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function avatarStyle(n){ const p=[['#E1F5EE','#0F6E56'],['#E6F1FB','#185FA5'],['#FAEEDA','#854F0B'],['#EEEDFE','#3C3489'],['#FAECE7','#993C1D']]; const[bg,c]=p[(n||'').charCodeAt(0)%p.length]; return`background:${bg};color:${c}`; }
function genId(){ return crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2); }
function stationNames(){ return S.stations.map(s=>s.name); }
function stationTypeIcon(t){ return{Gas:' ⛽','Storage':'🏭','Blending':'⚗️',Other:'📦'}[Object.keys({'Gas':'⛽','Storage':'🏭','Blending':'⚗️'}).find(k=>t&&t.startsWith(k))||'Other']||'📍'; }
function persistSettings(){ saveSettings({stations:S.stations,currencies:S.currencies,activeCurrency:S.activeCurrency,suppliers:S.suppliers}); }
function toast(msg,isErr=false){ const el=document.getElementById('toast');if(!el)return; el.textContent=msg;el.style.background=isErr?'var(--red)':'var(--text)'; el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800); }
function destroyCharts(...ids){ ids.forEach(id=>{if(charts[id]){charts[id].destroy();delete charts[id];}}); }

// ═══════════════════════════════════════
//  VIRTUAL DOM
// ═══════════════════════════════════════
function h(tag,attrs={},...kids){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(v==null||v===false)continue;
    if(k==='cls')el.className=v;
    else if(k==='html')el.innerHTML=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of kids.flat(Infinity)){
    if(c==null||c===false)continue;
    if(c instanceof Node)el.appendChild(c);
    else el.appendChild(document.createTextNode(String(c)));
  }
  return el;
}
function badge(text,cls='bg-gray'){ return h('span',{cls:'badge '+cls},text); }
function stationBadge(s){ const st=S.stations.find(x=>x.name===s); return badge(s,st&&st.type==='Storage Depot'?'bg-amber':'bg-blue'); }
function fuelBadge(f){ return badge(f,f==='Diesel'?'bg-amber':'bg-gray'); }
function statusBadge(s){ const m={Active:'bg-green','On Leave':'bg-amber',Inactive:'bg-gray','In Maintenance':'bg-amber',Retired:'bg-gray',Critical:'bg-red',Low:'bg-amber',OK:'bg-green'}; return badge(s,m[s]||'bg-gray'); }

// ═══════════════════════════════════════
//  FORM HELPERS
// ═══════════════════════════════════════
function inp(label,key,type='text',placeholder='',req=false){
  if(!S.form[key]&&key==='date')S.form[key]=today();
  return h('div',{cls:'form-group'},
    h('label',{},label+(req?' *':'')),
    h('input',{type,placeholder,value:S.form[key]||'',onInput:e=>S.form[key]=e.target.value})
  );
}
function sel(label,key,opts,placeholder='— select —',req=false){
  const s=h('select',{onChange:e=>S.form[key]=e.target.value},
    h('option',{value:''},placeholder),
    ...opts.map(o=>{const opt=h('option',{value:o},o);if(S.form[key]===o)opt.selected=true;return opt;})
  );
  return h('div',{cls:'form-group'},h('label',{},label+(req?' *':'')),s);
}

// ═══════════════════════════════════════
//  STATS
// ═══════════════════════════════════════
function calcStats(){
  const rev=S.sales.reduce((a,r)=>a+(r.total_revenue||r.liters*r.price_per_liter),0);
  const cost=S.deliveries.reduce((a,r)=>a+(r.total_cost||r.liters*r.cost_per_liter),0);
  const todayRev=S.sales.filter(s=>s.date===today()).reduce((a,r)=>a+(r.total_revenue||r.liters*r.price_per_liter),0);
  return{ rev,cost,margin:rev-cost,marginPct:rev>0?(rev-cost)/rev*100:0,todayRev,
    lSold:S.sales.reduce((a,r)=>a+r.liters,0),
    activeDrivers:S.drivers.filter(d=>d.status==='Active').length,
    activeFleet:S.trucks.filter(t=>t.status==='Active').length };
}
function getMonthly(){
  const now=new Date();
  return Array.from({length:6},(_,i)=>{
    const dt=new Date(now.getFullYear(),now.getMonth()-5+i,1);
    const yr=dt.getFullYear(),mo=dt.getMonth();
    const inR=arr=>arr.filter(r=>{const d=new Date(r.date+'T00:00:00');return d.getFullYear()===yr&&d.getMonth()===mo;});
    const mS=inR(S.sales),mD=inR(S.deliveries);
    const revenue=mS.reduce((a,r)=>a+(r.total_revenue||r.liters*r.price_per_liter),0);
    const cost=mD.reduce((a,r)=>a+(r.total_cost||r.liters*r.cost_per_liter),0);
    const stRevMap={};
    S.stations.forEach(st=>{stRevMap[st.name]=mS.filter(s=>s.station===st.name).reduce((a,r)=>a+(r.total_revenue||r.liters*r.price_per_liter),0);});
    return{label:MONTHS_SHORT[mo]+' '+String(yr).slice(2),revenue,cost,margin:revenue-cost,stRevMap,
      gasolineL:mS.filter(s=>s.fuel_type==='Gasoline').reduce((a,r)=>a+r.liters,0),
      dieselL:mS.filter(s=>s.fuel_type==='Diesel').reduce((a,r)=>a+r.liters,0)};
  });
}

function updateLocalInv(station,fuelType,liters,op){
  let inv=S.inventory.find(i=>i.station===station);
  if(!inv){inv={id:genId(),station,gasoline_liters:0,diesel_liters:0,gasoline_capacity:50000,diesel_capacity:50000};S.inventory.push(inv);}
  const f=fuelType==='Gasoline'?'gasoline_liters':'diesel_liters';
  inv[f]=Math.max(0,(inv[f]||0)+(op==='add'?liters:-liters));
}
async function saveDelivery(){
  const f=S.form;
  if(!f.date||!f.supplier||!f.station||!f.fuel_type||!f.liters||!f.cost_per_liter){S.error='Fill all required fields';render();return;}
  const entCur=getCurrency(f.currency||S.activeCurrency);
  const costUSD=parseFloat(f.cost_per_liter)/entCur.rate;
  const row={id:genId(),date:f.date,supplier:f.supplier,station:f.station,fuel_type:f.fuel_type,
    liters:parseFloat(f.liters),cost_per_liter:costUSD,total_cost:parseFloat(f.liters)*costUSD,
    truck_plate:f.truck_plate||'',driver:f.driver||'',currency:entCur.code,notes:f.notes||''};
  const ok=await dbInsert('fuel_deliveries',row);if(!ok)return;
  S.deliveries.unshift(row); updateLocalInv(row.station,row.fuel_type,row.liters,'add');
  const drv=S.drivers.find(d=>d.name===row.driver);
  if(drv){drv.trips=(drv.trips||0)+1;await dbUpdate('drivers',drv.id,{trips:drv.trips});}
  closeModal();toast('Delivery recorded');
}
async function saveSale(){

async function deleteRecord(table,id,arr){
  if(!confirm('Delete this record?'))return;
  const ok=await dbDelete(table,id);if(!ok)return;
  const i=arr.findIndex(r=>r.id===id);if(i>-1)arr.splice(i,1);
  render();toast('Deleted');
}
function addStation(){
  const f=S.form;if(!f.name||!f.name.trim()){S.error='Name required';render();return;}
  const name=f.name.trim();
  if(S.stations.find(s=>s.name.toLowerCase()===name.toLowerCase())){S.error='Name already exists';render();return;}
  S.stations.push({id:genId(),name,type:f.type||'Gas Station',city:f.city||'',country:f.country||'DRC'});
  persistSettings();closeModal();toast('Station added');
}
function removeStation(id){
  if(!confirm('Remove station? Historical data is kept.'))return;
  S.stations=S.stations.filter(s=>s.id!==id);
  persistSettings();render();toast('Station removed');
}
function addCurrency(){
  const f=S.form;
  if(!f.cur_code||!f.cur_symbol||!f.cur_rate){S.error='Code, symbol and rate are required';render();return;}
  if(S.currencies.find(c=>c.code===f.cur_code.toUpperCase())){S.error='Currency already exists';render();return;}
  S.currencies.push({code:f.cur_code.toUpperCase(),symbol:f.cur_symbol,name:f.cur_name||f.cur_code,rate:parseFloat(f.cur_rate)});
  persistSettings();closeModal();toast('Currency added');
}
function updateRate(code,rate){
  const c=S.currencies.find(x=>x.code===code);if(c){c.rate=parseFloat(rate)||c.rate;persistSettings();}
}
function removeCurrency(code){

  if(!confirm('Remove '+code+'?'))return;
  S.currencies=S.currencies.filter(c=>c.code!==code);
  if(S.activeCurrency===code)S.activeCurrency='USD';

function editStation(id){
  const st=S.stations.find(s=>s.id===id); if(!st)return;
  S.form={name:st.name,type:st.type,city:st.city,country:st.country,_editId:id,_oldName:st.name};
  S.modal='station';S.error=null;render();
}
function saveStation(){
  const f=S.form;if(!f.name||!f.name.trim()){S.error='Name required';render();return;}
  const name=f.name.trim();
  if(f._editId){
    // editing existing
    const st=S.stations.find(s=>s.id===f._editId);if(!st)return;
    const oldName=f._oldName;
    const conflict=S.stations.find(s=>s.id!==f._editId&&s.name.toLowerCase()===name.toLowerCase());
    if(conflict){S.error='Name already in use';render();return;}
    st.name=name;st.type=f.type||st.type;st.city=f.city||'';st.country=f.country||'DRC';
    // cascade rename across all local arrays
    if(oldName!==name){
      S.deliveries.forEach(d=>{if(d.station===oldName)d.station=name;});
      S.sales.forEach(s=>{if(s.station===oldName)s.station=name;});
      S.inventory.forEach(i=>{if(i.station===oldName)i.station=name;});
      S.drivers.forEach(d=>{if(d.station===oldName)d.station=name;});
      S.trucks.forEach(t=>{if(t.station===oldName)t.station=name;});
    }
    persistSettings();closeModal();toast('Station updated');
  } else {
    addStation();
  }
}

    h('label',{},'Entry currency'),

      inp('Price per liter ('+ec.symbol+')','price_per_liter','number','',true),

    );onSave=saveDriver;

    );onSave=saveTruck;

// ═══════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════
const PAGE_META=[
  {id:'dashboard', icon:'◉',label:'Dashboard',     section:'Operations'},
  {id:'deliveries',icon:'↓',label:'Deliveries',    section:'Operations'},
  {id:'sales',     icon:'↑',label:'Sales',         section:'Operations'},
  {id:'inventory', icon:'▦',label:'Inventory',     section:'Operations'},
  {id:'fleet',     icon:'◈',label:'Fleet & drivers',section:'Management'},
  {id:'trends',    icon:'∿',label:'Trends',        section:'Analytics'},
  {id:'reports',   icon:'≡',label:'Reports',       section:'Analytics'},
  {id:'settings',  icon:'⚙',label:'Settings',      section:'System'},
];
const RENDERERS={dashboard:renderDashboard,deliveries:renderDeliveries,sales:renderSales,inventory:renderInventory,fleet:renderFleet,trends:renderTrends,reports:renderReports,settings:renderSettings};

function render(){
  const app=document.getElementById('app');
  Object.keys(charts).forEach(id=>{if(!document.getElementById(id))destroyCharts(id);});
  if(S.page==='setup'){app.innerHTML='';app.appendChild(renderSetup());return;}
  if(S.loading){app.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:13px;color:var(--text2)">Loading data…</div>';return;}
  const pg=S.page; const meta=PAGE_META.find(p=>p.id===pg);
  const sections=[...new Set(PAGE_META.map(p=>p.section))];
  const topBtns=[];
  if(pg==='fleet'){ topBtns.push(h('button',{cls:'btn btn-sm',onClick:()=>{S.modal='truck';S.form={};S.error=null;render();}},'+ Truck')); topBtns.push(h('button',{cls:'btn btn-sm btn-primary',onClick:()=>{S.modal='driver';S.form={};S.error=null;render();}},'+ Driver')); }
  if(['dashboard','deliveries'].includes(pg)) topBtns.push(h('button',{cls:'btn btn-sm',onClick:()=>{S.modal='delivery';S.form={};S.error=null;render();}},'+ Delivery'));
  if(['dashboard','sales'].includes(pg)) topBtns.push(h('button',{cls:'btn btn-sm btn-primary',onClick:()=>{S.modal='sale';S.form={};S.error=null;render();}},'+ Sale'));
  if(SB) topBtns.push(h('button',{cls:'btn btn-sm',onClick:dbLoad},'↻'));
  topBtns.push(currencyPill());

  const sidebar=h('div',{cls:'sidebar'},
    h('div',{cls:'brand'},
      h('div',{cls:'brand-name'},'⛽ Kashabana'),
      h('div',{cls:'brand-sub'},S.online?'● Live — '+S.stations.length+' locations':'○ Demo mode')
    ),
    ...sections.flatMap(sec=>[
      h('div',{cls:'nav-section'},sec),
      ...PAGE_META.filter(p=>p.section===sec).map(p=>{
        const maint=p.id==='fleet'&&S.trucks.filter(t=>t.status==='In Maintenance').length;
        return h('div',{cls:'nav-item'+(pg===p.id?' active':''),onClick:()=>{S.page=p.id;S.tab='all';render();}},
          h('span',{cls:'nav-icon'},p.icon),p.label,maint?h('span',{cls:'nav-badge'},maint):null);
      })
    ])
  );

  const layout=h('div',{cls:'app'},sidebar,
    h('div',{cls:'main'},
      h('div',{cls:'topbar'},h('div',{cls:'page-title'},meta?.label||''),h('div',{cls:'topbar-right'},...topBtns)),
      h('div',{cls:'content'},(RENDERERS[pg]||renderDashboard)(),renderModal())
    )
  );
  app.innerHTML='';app.appendChild(layout);
}

// ═══════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════
(function boot(){
  const BUILD_URL = '__SUPABASE_URL__';
  const BUILD_KEY = '__SUPABASE_ANON_KEY__';
  const hasBuildCreds = BUILD_URL.startsWith('https://') && BUILD_KEY.length > 20;
  try{
    const cfg=JSON.parse(localStorage.getItem(CFG_KEY)||'{}');
    const url = cfg.url || (hasBuildCreds ? BUILD_URL : null);
    const key = cfg.key || (hasBuildCreds ? BUILD_KEY : null);
    if(url&&key){
      localStorage.setItem(CFG_KEY,JSON.stringify({url,key}));
      initSB(url,key);S.page='dashboard';render();dbLoad();return;
    }
  }catch(e){}
  if(hasBuildCreds){
    initSB(BUILD_URL,BUILD_KEY);S.page='dashboard';render();dbLoad();return;
  }
  S.page='setup';render();
})();
</script>
